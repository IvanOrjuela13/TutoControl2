<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .card-header {
            background-color: #4b3f72;
            color: #fff;
            text-align: center;
            padding: 1.5rem;
        }
        .form-control {
            border-radius: 10px;
        }
        .btn-primary {
            background-color: #6a11cb;
            border: none;
            border-radius: 10px;
            padding: 0.5rem 1.5rem;
            transition: background 0.3s;
        }
        .btn-primary:hover {
            background-color: #4b3f72;
        }
        #message {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card mx-auto mt-5" style="max-width: 400px;">
            <div class="card-header">
                <h2>Registro de Usuario</h2>
            </div>
            <div class="card-body">
                <form id="registerForm">
                    <div class="form-group">
                        <label for="username">Nombre de usuario:</label>
                        <input type="text" class="form-control" id="username" placeholder="Ingresa tu nombre de usuario" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña:</label>
                        <input type="password" class="form-control" id="password" placeholder="Ingresa tu contraseña" required>
                        <small class="form-text text-muted">Debe tener al menos 10 caracteres, una mayúscula, una minúscula y un número.</small>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block mt-4">Registrarse</button>
                </form>
                <div id="message" class="mt-3"></div>
                <p class="mt-3 text-center">¿Ya tienes una cuenta? <a href="login.html" class="text-primary">Iniciar sesión</a></p>
            </div>
        </div>
    </div>

    <script>
        const deviceID = localStorage.getItem('deviceID') || 'device-' + Date.now();
        localStorage.setItem('deviceID', deviceID);

        function isPasswordSecure(password) {
            const minLength = 10;
            const hasUpperCase = /[A-Z]/.test(password);
            const hasLowerCase = /[a-z]/.test(password);
            const hasNumber = /[0-9]/.test(password);

            return password.length >= minLength && hasUpperCase && hasLowerCase && hasNumber;
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!isPasswordSecure(password)) {
                document.getElementById('message').innerHTML = `<div class="alert alert-danger">La contraseña no cumple con los requisitos de seguridad.</div>`;
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, deviceID }),
                });

                const data = await response.json();
                const messageDiv = document.getElementById('message');

                if (response.ok) {
                    messageDiv.innerHTML = `<div class="alert alert-success">${data.msg}</div>`;
                } else {
                    messageDiv.innerHTML = `<div class="alert alert-danger">${data.msg}</div>`;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('message').innerHTML = `<div class="alert alert-danger">Error al enviar la solicitud.</div>`;
            }
        });
    </script>
</body>
</html>
