<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #ddd;
            font-family: Arial, sans-serif;
        }
        .container {
            background-color: rgba(28, 30, 33, 0.9);
            border-radius: 12px;
            padding: 2rem;
            max-width: 400px;
            box-shadow: 0px 4px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, #ff512f, #dd2476);
            filter: blur(50px);
            transform: rotate(-25deg);
            opacity: 0.4;
        }
        h2 {
            font-size: 1.75rem;
            font-weight: bold;
            text-align: center;
            color: #ff512f;
            margin-bottom: 1.5rem;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #444;
            color: #ddd;
            border-radius: 8px;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ff512f;
            box-shadow: none;
        }
        .btn-primary {
            background: linear-gradient(45deg, #ff512f, #dd2476);
            border: none;
            border-radius: 8px;
            padding: 0.8rem;
            font-weight: bold;
            color: #fff;
            transition: transform 0.2s;
        }
        .btn-primary:hover {
            transform: scale(1.05);
            background: linear-gradient(45deg, #ff6347, #e63950);
        }
        #message {
            font-weight: bold;
            text-align: center;
        }
        a {
            color: #ff512f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Registro de Usuario</h2>
        <form id="registerForm">
            <div class="form-group">
                <label for="username">Nombre de usuario:</label>
                <input type="text" class="form-control" id="username" placeholder="Ingresa tu nombre de usuario" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" class="form-control" id="password" placeholder="Ingresa tu contraseña" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block mt-4">Registrarse</button>
        </form>
        <div id="message" class="mt-3"></div>
        <p class="mt-3 text-center">¿Ya tienes una cuenta? <a href="login.html">Iniciar sesión</a></p>
    </div>

    <script>
        // Manteniendo las funcionalidades originales de tu archivo
        const deviceID = localStorage.getItem('deviceID') || 'device-' + Date.now();
        localStorage.setItem('deviceID', deviceID);

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password, deviceID }),
                });

                const data = await response.json();
                const messageDiv = document.getElementById('message');
                if (response.ok) {
                    messageDiv.innerHTML = `<div class="alert alert-success">${data.msg}</div>`;
                } else {
                    messageDiv.innerHTML = `<div class="alert alert-danger">${data.msg}</div>`;
                }
            } catch (error) {
                console.error('Error:', error);
                const messageDiv = document.getElementById('message');
                messageDiv.innerHTML = `<div class="alert alert-danger">Error al enviar la solicitud.</div>`;
            }
        });
    </script>
</body>
</html>
